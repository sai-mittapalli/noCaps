<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>nocaps</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/logo.png">
</head>
<body>
  <!-- App shell -->
  <div id="app">
    <!-- Top bar (shown on most pages) -->
    <header id="topbar" class="topbar hidden">
      <div class="topbar-left">
        <button id="backBtn" class="icon-btn hidden" onclick="history.back()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <div class="logo-mark">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="1"/><line x1="12" y1="23" x2="12" y2="21"/><line x1="3" y1="12" x2="1" y2="12"/><line x1="23" y1="12" x2="21" y2="12"/></svg>
          <span class="logo-text"><span>no</span>caps</span>
        </div>
      </div>
      <div id="topbarTitle" class="topbar-title"></div>
      <div id="topbarRight" class="topbar-right"></div>
    </header>

    <!-- Page content -->
    <main id="page"></main>

    <!-- Bottom navigation -->
    <nav id="bottomnav" class="bottomnav hidden">
      <button class="nav-item" data-page="matches" onclick="navigate('matches')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
        <span>Matches</span>
      </button>
      <button class="nav-item" data-page="broadcast" onclick="navigate('broadcast')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15.6 11.6A4 4 0 0 0 12 8a4 4 0 0 0-3.6 3.6"/><path d="M19.1 8.1A9 9 0 0 0 12 5a9 9 0 0 0-7.1 3.1"/><circle cx="12" cy="14" r="2"/><line x1="12" y1="16" x2="12" y2="20"/><line x1="9" y1="20" x2="15" y2="20"/></svg>
        <span>Broadcast</span>
      </button>
      <button class="nav-item" data-page="replays" onclick="navigate('replays')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span>Replays</span>
      </button>
      <button class="nav-item" data-page="profile" onclick="navigate('profile')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </button>
    </nav>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/webrtc.js"></script>
  <script src="/js/pages/login.js"></script>
  <script src="/js/pages/matches.js"></script>
  <script src="/js/pages/watch.js"></script>
  <script src="/js/pages/broadcast.js"></script>
  <script src="/js/pages/director.js"></script>
  <script src="/js/pages/replays.js"></script>
  <script src="/js/pages/profile.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
